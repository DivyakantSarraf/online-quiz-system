<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Quizify</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="/index.html" class="nav-brand">
      <span>⚡</span> Quizify
    </a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
    <label for="nav-toggle" class="nav-toggle-label">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <ul class="nav-links" id="navbar-links">
      <li><a href="/index.html" class="nav-link">Home</a></li>
      <li><a href="/browse.html" class="nav-link">Browse Quizzes</a></li>
      <li><a href="/login.html" class="nav-link">Student Login</a></li>
      <li><a href="/admin-login.html" class="nav-link active">Admin Portal</a></li>
    </ul>
  </nav>

  <!-- Content Wrapper -->
  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="glass-card">
        <div class="auth-header">
          <h2 class="auth-title">Admin Portal</h2>
          <p class="auth-subtitle">Create and manage your quizzes</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login" data-target="admin-login-view">Admin Login</div>
          <div class="auth-tab" id="tab-register" data-target="admin-register-view">Register Admin</div>
        </div>

        <!-- Alert Container -->
        <div id="auth-alert" class="alert alert-danger"></div>

        <!-- Login Form -->
        <div id="admin-login-view" class="tab-content">
          <form id="admin-login-form" novalidate>
            <div class="form-group">
              <label for="admin-log-email" class="form-label">Admin Email</label>
              <input type="email" id="admin-log-email" class="form-control" placeholder="admin@domain.com" required>
            </div>

            <div class="form-group">
              <label for="admin-log-password" class="form-label">Password</label>
              <input type="password" id="admin-log-password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary auth-action-btn">
              Log In as Admin
            </button>
          </form>
        </div>

        <!-- Registration Form -->
        <div id="admin-register-view" class="tab-content" style="display: none;">
          <form id="admin-register-form" novalidate>
            <div class="form-group">
              <label for="admin-reg-name" class="form-label">Full Name</label>
              <input type="text" id="admin-reg-name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
              <label for="admin-reg-email" class="form-label">Admin Email</label>
              <input type="email" id="admin-reg-email" class="form-control" placeholder="admin@domain.com" required>
            </div>

            <div class="form-group">
              <label for="admin-reg-password" class="form-label">Password</label>
              <input type="password" id="admin-reg-password" class="form-control" placeholder="Min. 6 characters" required>
            </div>

            <div class="form-group">
              <label for="admin-reg-confirm" class="form-label">Confirm Password</label>
              <input type="password" id="admin-reg-confirm" class="form-control" placeholder="Repeat password" required>
            </div>

            <div class="form-group">
              <label for="admin-reg-key" class="form-label" style="color: var(--color-warning);">Admin Secret Code</label>
              <input type="password" id="admin-reg-key" class="form-control" placeholder="Enter admin registration secret" required style="border-color: rgba(245, 158, 11, 0.4);">
            </div>

            <button type="submit" class="btn btn-primary auth-action-btn">
              Register Admin Account
            </button>
          </form>
        </div>

        <div class="auth-footer">
          Are you a student? <a href="/login.html">Access Student Login</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Quizify. Built as part of Software Engineering Practical project.</p>
  </footer>

  <!-- Scripts -->
  <script type="module" src="/js/pages/auth-pages.js"></script>
</body>
</html>
